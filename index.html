<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後出しじゃんけん</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="modeScreen">
  <h1>後出しじゃんけん ✊✌️✋</h1>
  <div class="mode-buttons">
    <button onclick="unlockAudio(); startGame(1)">モード1（勝ちのみ）</button>
    <button onclick="unlockAudio(); startGame(2)">モード2（負けのみ）</button>
    <button onclick="unlockAudio(); startGame(3)">モード3（ランダム）</button>
  </div>
</div>

<div id="gameScreen" class="hidden">
  <div id="cpuHandImg"></div>
  <div id="result"></div>

  <!-- 👇 ボタンUI変更済み -->
  <div class="player-buttons">
    <button data-hand="グー">
      <div class="hand-icon">✊</div>
      <div class="hand-text">グー</div>
    </button>

    <button data-hand="チョキ">
      <div class="hand-icon">✌️</div>
      <div class="hand-text">チョキ</div>
    </button>

    <button data-hand="パー">
      <div class="hand-icon">✋</div>
      <div class="hand-text">パー</div>
    </button>
  </div>
</div>

<div id="resultScreen" class="hidden">
  <div id="finalMessage"></div>
  <div id="finalScore"></div>
  <button onclick="restartGame()">もう一度トライ</button>
</div>

<audio id="soundCorrect" src="correct2.mp3"></audio>
<audio id="soundResult" src="result.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
